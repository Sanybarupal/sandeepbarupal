<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Glassmorphism Theme</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Background Glow Effects -->
    <div class="bg-glow glow-green"></div>

    <!-- Navigation -->
    <nav class="navbar glass-nav">
        <div class="logo">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2L2 7L12 12L22 7L12 2Z" fill="white"/>
                <path d="M2 17L12 22L22 17" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M2 12L12 17L22 12" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </div>
        <ul class="nav-links">
            <li><a href="#">Home</a></li>
            <li><a href="plan.html">Pricing</a></li>
            <li><a href="#">FAQ</a></li>
            <li><a href="contact.html" class="active">Contact</a></li>
        </ul>
        <button class="btn btn-white">Download</button>
    </nav>

    <main>
        <!-- Contact Section -->
        <section class="contact-section">
            <div class="bg-text">CONTACT</div>
            
            <div class="contact-container">
                <div class="contact-info">
                    <div class="tag glass-tag">
                        <i class="fa-solid fa-circle-user"></i> Contact
                    </div>
                    <h2>Get in touch</h2>
                    <p>Have questions or ready to transform your business with AI automation?</p>
                    
                    <div class="info-cards">
                        <div class="info-card glass">
                            <div class="icon-box"><i class="fa-regular fa-envelope"></i></div>
                            <div class="info-text">
                                <h4>Email us</h4>
                                <p>johnnykyorov@gmail.com</p>
                            </div>
                            <div class="arrow"><i class="fa-solid fa-arrow-trend-up"></i></div>
                        </div>
                        
                        <div class="info-card glass">
                            <div class="icon-box"><i class="fa-solid fa-phone"></i></div>
                            <div class="info-text">
                                <h4>Call us</h4>
                                <p>(501) 123-4567</p>
                            </div>
                            <div class="arrow"><i class="fa-solid fa-arrow-trend-up"></i></div>
                        </div>
                        
                        <div class="info-card glass">
                            <div class="icon-box"><i class="fa-solid fa-location-dot"></i></div>
                            <div class="info-text">
                                <h4>Our location</h4>
                                <p>Crosby Street, NY, US</p>
                            </div>
                            <div class="arrow"><i class="fa-solid fa-arrow-trend-up"></i></div>
                        </div>
                    </div>
                </div>
                
                <div class="contact-form glass">
                    <form>
                        <div class="form-group">
                            <label>Name</label>
                            <input type="text" placeholder="" required>
                        </div>
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" placeholder="" required>
                        </div>
                        <div class="form-group">
                            <label>Message</label>
                            <textarea rows="5" placeholder="" required></textarea>
                        </div>
                        <button type="submit" class="btn btn-white w-100">Submit</button>
                    </form>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
